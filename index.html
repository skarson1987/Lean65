<!DOCTYPE html>
<html>
<head>
<title>Lean 65 Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system;
  background: #0b0f19;
  color: white;
  padding: 20px;
}
h1 { color: #22c55e; }

.card {
  background: #111827;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
}

.progress {
  background: #1f2937;
  border-radius: 10px;
  height: 20px;
}

.progress-bar {
  height: 20px;
  background: #22c55e;
  border-radius: 10px;
  width: 0%;
}
</style>
</head>

<body>

<h1>Lean 65</h1>

<div class="card">
<h3>Today’s Plan</h3>
<p id="day"></p>
<ul id="mealPlan"></ul>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Weight: <span id="weight">--</span> kg</p>
<p>Status: <span id="status">--</span></p>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>
</div>

<div class="card">
<h3>Update Weight</h3>
<input type="number" id="inputWeight" placeholder="Weight">
<button onclick="saveWeight()">Save</button>
</div>

<script>
let startWeight = 83;
let goal = 65;

let weeklyPlan = {
  Monday: ["🥚 Breakfast: Eggs + almonds","🍎 1 PM: Apple","🍛 Lunch: Fish + rice + dal","☕ Snack: Eggs","🍗 Dinner: Fish + veg"],
  Tuesday: ["🍳 Breakfast: Omelette","🥗 1 PM: Salad","🍛 Lunch: Chicken + rice","☕ Snack: Chana","🍗 Dinner: Egg + veg"],
  Wednesday: ["🧀 Breakfast: Paneer","🍈 1 PM: Guava","🍛 Lunch: Fish + rice","☕ Snack: Peanuts","🍗 Dinner: Chicken + veg"],
  Thursday: ["🥣 Breakfast: Curd + nuts","🍉 1 PM: Papaya","🍛 Lunch: Fish + rice","☕ Snack: Eggs","🍗 Dinner: Paneer + veg"],
  Friday: ["🥚 Breakfast: Eggs","🍊 1 PM: Orange","🍛 Lunch: Chicken + rice","☕ Snack: Sprouts","🍗 Dinner: Fish + veg"],
  Saturday: ["🍳 Breakfast: Omelette","🥗 1 PM: Salad","🍛 Lunch: Mutton + rice","☕ Snack: Egg","🍗 Dinner: Egg + veg"],
  Sunday: ["🥣 Breakfast: Curd + nuts","🍎 1 PM: Fruit","🍛 Lunch: Fish + rice","☕ Snack: Chana","🍗 Dinner: Chicken + veg"]
};

function loadMeals() {
  let today = new Date().toLocaleString('en-US', { weekday: 'long' });
  document.getElementById("day").innerText = today;

  let meals = weeklyPlan[today];
  let list = document.getElementById("mealPlan");
  list.innerHTML = "";

  meals.forEach(m => {
    let li = document.createElement("li");
    li.innerText = m;
    list.appendChild(li);
  });
}

function saveWeight() {
  let w = document.getElementById("inputWeight").value;
  localStorage.setItem("weight", w);
  loadData();
}

function loadData() {
  let w = localStorage.getItem("weight");
  document.getElementById("weight").innerText = w || "--";

  if (w && w <= goal) {
    document.getElementById("status").innerText = "Goal Achieved 🎉";
  } else if (w) {
    document.getElementById("status").innerText = "In Progress";
  }

  if (w) {
    let progress = ((startWeight - w) / (startWeight - goal)) * 100;
    document.getElementById("bar").style.width = progress + "%";
  }
}

loadMeals();
loadData();
</script>

</body>
</html>
