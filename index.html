<!DOCTYPE html>
<html>
<head>
<title>Lean 65 Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: -apple-system;
  background: #0b0f19;
  color: white;
  padding: 16px;
}

h1 { color: #22c55e; }

.card {
  background: #111827;
  padding: 16px;
  border-radius: 16px;
  margin-bottom: 16px;
}

input {
  width: 65%;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #22c55e;
  font-weight: bold;
}

.progress {
  background: #1f2937;
  height: 12px;
  border-radius: 10px;
}

.progress-bar {
  height: 12px;
  background: #22c55e;
  border-radius: 10px;
  width: 0%;
}
</style>
</head>

<body>

<h1>Lean 65</h1>

<div class="card">
<h3>Today’s Plan</h3>
<p id="day"></p>
<ul id="mealPlan"></ul>
</div>

<div class="card">
<h3>Dashboard</h3>
<p>Weight: <span id="weight">--</span> kg</p>
<p>Status: <span id="status">--</span></p>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>
</div>

<div class="card">
<h3>Update Weight</h3>
<input type="number" id="inputWeight" placeholder="Weight">
<button onclick="saveData()">Save</button>
</div>

<!-- ✅ GRAPH ADDED -->
<div class="card">
<h3>Progress Graph</h3>
<canvas id="chart"></canvas>
</div>

<script>
let startWeight = 83;
let goal = 65;
let chart;

let weeklyPlan = {
  Monday: ["🥚 Eggs","🍎 Apple","🍛 Fish + rice","☕ Eggs","🍗 Fish + veg"],
  Tuesday: ["🍳 Omelette","🥗 Salad","🍛 Chicken + rice","☕ Chana","🍗 Egg + veg"],
  Wednesday: ["🧀 Paneer","🍈 Guava","🍛 Fish + rice","☕ Peanuts","🍗 Chicken + veg"],
  Thursday: ["🥣 Curd","🍉 Papaya","🍛 Fish + rice","☕ Eggs","🍗 Paneer + veg"],
  Friday: ["🥚 Eggs","🍊 Orange","🍛 Chicken + rice","☕ Sprouts","🍗 Fish + veg"],
  Saturday: ["🍳 Omelette","🥗 Salad","🍛 Mutton + rice","☕ Egg","🍗 Egg + veg"],
  Sunday: ["🥣 Curd","🍎 Fruit","🍛 Fish + rice","☕ Chana","🍗 Chicken + veg"]
};

function loadMeals() {
  let today = new Date().toLocaleString('en-US', { weekday: 'long' });
  document.getElementById("day").innerText = today;

  let meals = weeklyPlan[today];
  let list = document.getElementById("mealPlan");
  list.innerHTML = "";

  meals.forEach(m => {
    let li = document.createElement("li");
    li.innerText = m;
    list.appendChild(li);
  });
}

function saveData() {
  let w = document.getElementById("inputWeight").value;
  let history = JSON.parse(localStorage.getItem("history") || "[]");

  history.push(w);
  localStorage.setItem("history", JSON.stringify(history));
  localStorage.setItem("weight", w);

  loadData();
}

function loadData() {
  let w = localStorage.getItem("weight");
  document.getElementById("weight").innerText = w || "--";

  if (w && w <= goal) {
    document.getElementById("status").innerText = "Goal Achieved 🎉";
  } else if (w) {
    document.getElementById("status").innerText = "In Progress";
  }

  if (w) {
    let progress = ((startWeight - w) / (startWeight - goal)) * 100;
    document.getElementById("bar").style.width = progress + "%";
  }

  updateChart();
}

function updateChart() {
  let history = JSON.parse(localStorage.getItem("history") || "[]");

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: history.map((_, i) => "Day " + (i+1)),
      datasets: [{
        label: 'Weight',
        data: history,
        borderWidth: 2
      }]
    }
  });
}

loadMeals();
loadData();
</script>

</body>
</html>
